site_name: ONC Hydrophone Data
site_description: User guide and API reference for downloading ONC hydrophone data.
site_author: ONC Hydrophone Data Contributors
site_url: https://spiffical.github.io/onc-hydrophone-data/

repo_name: Spiffical/onc-hydrophone-data
repo_url: https://github.com/Spiffical/onc-hydrophone-data
edit_uri: ""

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy

nav:
  - Home: index.md
  - Start Here:
      - 1. Install & Configure: setup.md
      - 2. Find a Hydrophone: inventory.md
      - 3. Audio to Spectrogram: quickstart.md
  - How-to Guides:
      - Download Audio: audio_downloads.md
      - Generate Local Spectrograms: custom_spectrograms.md
      - Advanced & Batch Downloads: downloads.md
      - Choose ONC Server Spectrograms: onc_spectrogram_options.md
      - Troubleshooting: troubleshooting.md
  - API Reference:
      - Overview: reference/index.md
      - HydrophoneDownloader: reference/downloader.md
      - Deployment Checker: reference/deployment_checker.md
      - Spectrogram Generator: reference/spectrogram_generator.md
      - ONC Common Helpers: reference/onc_common.md

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            merge_init_into_class: true
            show_source: false
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
